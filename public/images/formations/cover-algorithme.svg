<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <radialGradient id="bg-a" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0b1e38"/>
      <stop offset="55%" stop-color="#040d18"/>
      <stop offset="100%" stop-color="#020810"/>
    </radialGradient>
    <linearGradient id="box-a" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" stop-color="#1a4080"/>
      <stop offset="45%" stop-color="#002870"/>
      <stop offset="100%" stop-color="#000f35"/>
    </linearGradient>
    <linearGradient id="shine-a" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.28"/>
      <stop offset="18%" stop-color="white" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="letter-a" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b8f5ff"/>
      <stop offset="35%" stop-color="#05dde1"/>
      <stop offset="100%" stop-color="#027a8a"/>
    </linearGradient>
    <filter id="bloom-a" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="28" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-a" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft-a" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg-a)"/>

  <!-- Ambient bloom behind box -->
  <rect x="190" y="65" width="420" height="320" rx="64" fill="#05dde1" opacity="0.18" filter="url(#bloom-a)"/>

  <!-- Box shadow/depth -->
  <rect x="185" y="62" width="430" height="328" rx="66" fill="#05dde1" opacity="0.07"/>

  <!-- Box main -->
  <rect x="178" y="54" width="444" height="342" rx="62" fill="url(#box-a)"/>

  <!-- Box inner glow (bottom-right reflected) -->
  <rect x="178" y="54" width="444" height="342" rx="62" fill="none" stroke="#05dde1" stroke-width="1" stroke-opacity="0.35"/>

  <!-- Box top shine (glass effect) -->
  <rect x="178" y="54" width="444" height="342" rx="62" fill="url(#shine-a)"/>

  <!-- Inner radial glow behind letters -->
  <ellipse cx="400" cy="225" rx="160" ry="130" fill="#05dde1" opacity="0.10" filter="url(#soft-a)"/>

  <!-- Letters with glow -->
  <g filter="url(#glow-a)">
    <text x="400" y="225"
      font-family="'Arial Black','Arial Bold',Arial,sans-serif"
      font-size="210" font-weight="900"
      fill="url(#letter-a)"
      text-anchor="middle"
      dominant-baseline="central"
      letter-spacing="-6">in</text>
  </g>

  <!-- Letter top highlight (reflection) -->
  <text x="400" y="225"
    font-family="'Arial Black','Arial Bold',Arial,sans-serif"
    font-size="210" font-weight="900"
    fill="white" fill-opacity="0.12"
    text-anchor="middle"
    dominant-baseline="central"
    letter-spacing="-6">in</text>

  <!-- Play button frosted glass -->
  <circle cx="400" cy="225" r="54" fill="#05dde1" opacity="0.15" filter="url(#soft-a)"/>
  <circle cx="400" cy="225" r="50" fill="white" fill-opacity="0.12"/>
  <circle cx="400" cy="225" r="46" fill="white" fill-opacity="0.88"/>
  <!-- Shine on play button -->
  <ellipse cx="393" cy="213" rx="18" ry="10" fill="white" fill-opacity="0.35"/>
  <!-- Play triangle -->
  <polygon points="388,207 388,243 424,225" fill="#002060"/>
</svg>
