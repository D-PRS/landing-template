<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <radialGradient id="bg-e" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#100820"/>
      <stop offset="55%" stop-color="#070412"/>
      <stop offset="100%" stop-color="#03020a"/>
    </radialGradient>
    <linearGradient id="box-e" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" stop-color="#3d1a80"/>
      <stop offset="45%" stop-color="#2e1065"/>
      <stop offset="100%" stop-color="#120530"/>
    </linearGradient>
    <linearGradient id="shine-e" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.28"/>
      <stop offset="18%" stop-color="white" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="letter-e" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8d5ff"/>
      <stop offset="35%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <filter id="bloom-e" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="28" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-e" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft-e" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg-e)"/>
  <rect x="190" y="65" width="420" height="320" rx="64" fill="#a78bfa" opacity="0.18" filter="url(#bloom-e)"/>
  <rect x="185" y="62" width="430" height="328" rx="66" fill="#a78bfa" opacity="0.07"/>
  <rect x="178" y="54" width="444" height="342" rx="62" fill="url(#box-e)"/>
  <rect x="178" y="54" width="444" height="342" rx="62" fill="none" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.35"/>
  <rect x="178" y="54" width="444" height="342" rx="62" fill="url(#shine-e)"/>
  <ellipse cx="400" cy="225" rx="160" ry="130" fill="#a78bfa" opacity="0.10" filter="url(#soft-e)"/>

  <g filter="url(#glow-e)">
    <text x="400" y="225"
      font-family="'Arial Black','Arial Bold',Arial,sans-serif"
      font-size="210" font-weight="900"
      fill="url(#letter-e)"
      text-anchor="middle"
      dominant-baseline="central"
      letter-spacing="-6">in</text>
  </g>
  <text x="400" y="225"
    font-family="'Arial Black','Arial Bold',Arial,sans-serif"
    font-size="210" font-weight="900"
    fill="white" fill-opacity="0.12"
    text-anchor="middle"
    dominant-baseline="central"
    letter-spacing="-6">in</text>

  <circle cx="400" cy="225" r="54" fill="#a78bfa" opacity="0.15" filter="url(#soft-e)"/>
  <circle cx="400" cy="225" r="50" fill="white" fill-opacity="0.12"/>
  <circle cx="400" cy="225" r="46" fill="white" fill-opacity="0.88"/>
  <ellipse cx="393" cy="213" rx="18" ry="10" fill="white" fill-opacity="0.35"/>
  <polygon points="388,207 388,243 424,225" fill="#2e1065"/>
</svg>
